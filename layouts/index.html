{{ define "body" }}
    <body class="{{ if .Site.Params.backgroundImage }} background-image" style="background-image: url('{{ .Site.Params.backgroundImage }}');" {{ else }}"{{ end }}>
{{ end }}

{{ define "main" }}
    <div class="content-center">
        <main>
            <div>
                {{ if .Site.Params.Portrait.Path }}
                <img src="{{ .Site.Params.Portrait.Path }}" class="circle" alt="{{ .Site.Params.Portrait.Alt }}" style="max-width:{{ .Site.Params.Portrait.MaxWidth }}" />
                {{ end }}

                <h1>{{ .Site.Title }}</h1>

                {{ partial "subtitle.html" . }}

                {{- with .Site.Params.social }}
                    <div>
                        {{ partial "social-icons.html" . }}
                    </div>
                {{- end }}

                <div style="margin-top: 1rem; text-align: center;">
                    <a href="https://github.com/PDGIII/website/actions/workflows/build-website.yml" target="_blank">
                        <img src="https://github.com/PDGIII/website/actions/workflows/build-website.yml/badge.svg" alt="build status" />
                    </a>
                </div>

                <div style="margin-top: 1rem;">
                    <img src="https://ghchart.rshah.org/9b59b6/PDGIII" alt="GitHub contributions" style="width: 100%; max-width: 720px;" />
                </div>
            </div>
        </main>
    </div>
{{ end }}
